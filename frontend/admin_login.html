<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureMe - Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 0; }
        .login-card { width: 100%; max-width: 400px; }
        .login-logo { text-align: center; margin-bottom: 2rem; font-size: 2rem; color: white; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo nav-logo">Future<span class="logo-accent">Me</span> Admin</div>
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Security Login</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label>User Name</label>
                    <input type="text" id="admin-username" placeholder="Enter Username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="admin-password" placeholder="••••••••" required>
                </div>
                <div id="login-error" class="hidden" style="color: var(--error); font-size: 0.85rem; margin-bottom: 1rem; text-align: center;"></div>
                <button type="submit" class="primary-btn" style="width: 100%;">Sign In</button>
            </form>
            <div style="text-align: center; margin-top: 2rem;">
                <a href="index.html" style="color: var(--secondary); text-decoration: none; font-size: 0.9rem;">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="admin_login.js"></script>
</body>
</html>
