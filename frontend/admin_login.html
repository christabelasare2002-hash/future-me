<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureMe - Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 2.5rem;
            color: white;
            font-weight: 800;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: white;
        }
        .card h2 {
            font-weight: 700;
            color: white;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 2.5rem;
        }
        label {
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.50rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.875rem 1.25rem;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.25s ease;
        }
        input:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
            outline: none;
        }
        .primary-btn {
            padding: 0.875rem 1.5rem;
            font-weight: 700;
            border-radius: 12px;
            font-size: 0.95rem;
            width: 100%;
        }
        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            width: 100%;
        }
        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo nav-logo">Future<span class="logo-accent">Me</span> Admin</div>
        <div class="card">
            <h2>Security Login</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label>User Name</label>
                    <input type="text" id="admin-username" placeholder="Enter Username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="admin-password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <div id="login-error" class="hidden" style="color: var(--error); font-size: 0.85rem; margin-bottom: 1.5rem; text-align: center; background: rgba(239, 68, 68, 0.1); padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2);"></div>
                <button type="submit" class="primary-btn">Sign In</button>
            </form>
            <div style="text-align: center; margin-top: 2rem;">
                <a href="index.html" class="back-link">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="admin_login.js"></script>
</body>
</html>
